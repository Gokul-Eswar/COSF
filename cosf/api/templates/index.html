<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COSF Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        .node { stroke: #fff; stroke-width: 1.5px; }
        .link { stroke: #94a3b8; stroke-opacity: 0.4; stroke-width: 1.5px; }
        .link.inferred { stroke-dasharray: 5,5; stroke: #fbbf24; stroke-opacity: 0.8; }
        #graph-container { background-color: #f8fafc; cursor: grab; }
        #graph-container:active { cursor: grabbing; }
        .node-label { font-size: 10px; font-weight: 600; pointer-events: none; fill: #475569; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <!-- Navbar -->
    <nav class="bg-slate-900 text-white px-6 py-4 flex justify-between items-center shadow-md">
        <div class="flex items-center space-x-3">
            <div class="bg-blue-600 p-2 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                </svg>
            </div>
            <h1 class="text-xl font-bold tracking-tight">COSF <span class="text-slate-400 font-normal">Command Center</span></h1>
        </div>
        <div class="flex items-center space-x-4">
            <button id="trigger-scan-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md font-medium transition-colors">
                New Scan
            </button>
            <span class="text-slate-400">v0.1.0</span>
        </div>
    </nav>

    <div class="flex h-[calc(100vh-72px)] overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-80 bg-white border-r border-slate-200 overflow-y-auto p-6 space-y-8">
            <!-- Stats -->
            <div>
                <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-4">Network Overview</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-slate-50 p-3 rounded-lg border border-slate-100">
                        <p class="text-2xl font-bold" id="stat-assets">0</p>
                        <p class="text-xs text-slate-500">Assets</p>
                    </div>
                    <div class="bg-slate-50 p-3 rounded-lg border border-slate-100">
                        <p class="text-2xl font-bold text-red-600" id="stat-vulns">0</p>
                        <p class="text-xs text-slate-500">Vulns</p>
                    </div>
                </div>
            </div>

            <!-- High Risk Assets -->
            <div>
                <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-4 text-red-600">High Risk Targets</h2>
                <div id="high-risk-list" class="space-y-3">
                    <p class="text-sm text-slate-400 italic">No high risk assets found.</p>
                </div>
            </div>

            <!-- Recent Executions -->
            <div>
                <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-4">Recent Executions</h2>
                <div id="execution-list" class="space-y-3">
                    <!-- Loaded via JS -->
                </div>
            </div>
        </aside>

        <!-- Main Content (Graph) -->
        <main class="flex-1 relative">
            <div id="graph-container" class="w-full h-full overflow-hidden">
                <!-- SVG injected here -->
            </div>
            
            <!-- Floating Controls -->
            <div class="absolute bottom-6 right-6 flex flex-col space-y-2">
                <button onclick="refreshData()" class="bg-white p-3 rounded-full shadow-lg border border-slate-200 hover:bg-slate-50 transition-colors" title="Refresh Graph">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                </button>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="scan-modal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl overflow-hidden">
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center">
                <h3 class="text-lg font-bold text-slate-800">Launch New Security Workflow</h3>
                <button onclick="toggleModal('scan-modal')" class="text-slate-400 hover:text-slate-600">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="p-6 space-y-4">
                <label class="block">
                    <span class="text-sm font-medium text-slate-700">Workflow YAML</span>
                    <textarea id="workflow-yaml" rows="12" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 font-mono text-sm bg-slate-50 p-4 border" placeholder="name: My Assessment
tasks:
  - id: scan
    adapter: nmap
    params:
      target: 127.0.0.1"></textarea>
                </label>
                <div class="flex justify-end space-x-3">
                    <button onclick="toggleModal('scan-modal')" class="px-4 py-2 text-slate-600 font-medium">Cancel</button>
                    <button onclick="submitWorkflow(true)" class="bg-amber-500 text-white px-6 py-2 rounded-md font-bold shadow-md hover:bg-amber-600 transition-colors">Dry Run</button>
                    <button onclick="submitWorkflow(false)" class="bg-blue-600 text-white px-6 py-2 rounded-md font-bold shadow-md hover:bg-blue-700 transition-colors">Run Workflow</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "";

        function toggleModal(id) {
            document.getElementById(id).classList.toggle('hidden');
        }

        document.getElementById('trigger-scan-btn').onclick = () => toggleModal('scan-modal');

        async function fetchExecutions() {
            try {
                const res = await fetch(`${API_BASE}/executions`);
                const data = await res.json();
                document.getElementById('execution-list').innerHTML = data.slice(0, 10).map(e => `
                    <div class="p-3 bg-slate-50 rounded-lg border border-slate-100">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-sm font-bold text-slate-800 truncate">${e.workflow_name}</span>
                            <span class="text-[10px] px-2 py-0.5 rounded-full ${e.status === 'completed' ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700'} uppercase font-bold">
                                ${e.status}
                            </span>
                        </div>
                        <p class="text-[10px] text-slate-400 font-mono">${e.id.substring(0, 13)}...</p>
                    </div>
                `).join('');
            } catch (e) { console.error(e); }
        }

        async function fetchAssets() {
            try {
                const res = await fetch(`${API_BASE}/assets`);
                const data = await res.json();
                const highRisk = data.filter(a => a.risk_score > 5.0);
                document.getElementById('high-risk-list').innerHTML = highRisk.length === 0 ? 
                    '<p class="text-sm text-slate-400 italic">No high risk assets found.</p>' :
                    highRisk.map(a => `
                        <div class="p-3 bg-red-50 rounded-lg border border-red-100 border-l-4 border-l-red-500">
                            <div class="flex justify-between items-start">
                                <div><p class="text-sm font-bold text-slate-800">${a.name}</p><p class="text-xs text-slate-500">${a.ip}</p></div>
                                <span class="text-xs font-black text-red-600">${a.risk_score.toFixed(1)}</span>
                            </div>
                        </div>
                    `).join('');
            } catch (e) { console.error(e); }
        }

        async function submitWorkflow(dryRun = false) {
            const yaml = document.getElementById('workflow-yaml').value;
            const res = await fetch(`${API_BASE}/workflows/run`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ workflow_yaml: yaml, dry_run: dryRun })
            });
            if (res.ok) { toggleModal('scan-modal'); refreshData(); }
        }

        let simulation, svg, container;

        async function refreshData() {
            fetchExecutions();
            fetchAssets();
            const res = await fetch(`${API_BASE}/graph`);
            const data = await res.json();
            
            document.getElementById('stat-assets').innerText = data.nodes.filter(n => n.type === 'asset').length;
            document.getElementById('stat-vulns').innerText = data.nodes.filter(n => n.type === 'vulnerability').length;
            
            renderGraph(data);
        }

        function renderGraph(data) {
            const el = document.getElementById('graph-container');
            const width = el.clientWidth, height = el.clientHeight;

            d3.select("#graph-container").selectAll("svg").remove();
            svg = d3.select("#graph-container").append("svg").attr("width", "100%").attr("height", "100%")
                .call(d3.zoom().on("zoom", (e) => container.attr("transform", e.transform)));
            container = svg.append("g");

            simulation = d3.forceSimulation(data.nodes)
                .force("link", d3.forceLink(data.links).id(d => d.id).distance(80))
                .force("charge", d3.forceManyBody().strength(-200))
                .force("center", d3.forceCenter(width / 2, height / 2));

            const link = container.append("g").selectAll("line").data(data.links).join("line")
                .attr("class", d => `link ${d.inferred ? 'inferred' : ''}`);

            const node = container.append("g").selectAll("g").data(data.nodes).join("g")
                .call(d3.drag().on("start", dragstarted).on("drag", dragged).on("end", dragended));

            node.append("circle").attr("r", d => d.type === 'asset' ? 10 : 6)
                .attr("fill", d => ({asset: "#3b82f6", service: "#10b981", vulnerability: "#ef4444"}[d.type] || "#94a3b8"))
                .attr("class", "node");

            node.append("text").attr("class", "node-label").attr("dy", 20).attr("text-anchor", "middle")
                .text(d => d.label || d.id);

            simulation.on("tick", () => {
                link.attr("x1", d => d.source.x).attr("y1", d => d.source.y).attr("x2", d => d.target.x).attr("y2", d => d.target.y);
                node.attr("transform", d => `translate(${d.x},${d.y})`);
            });
        }

        function dragstarted(event) { if (!event.active) simulation.alphaTarget(0.3).restart(); event.subject.fx = event.subject.x; event.subject.fy = event.subject.y; }
        function dragged(event) { event.subject.fx = event.x; event.subject.fy = event.y; }
        function dragended(event) { if (!event.active) simulation.alphaTarget(0); event.subject.fx = null; event.subject.fy = null; }

        window.onload = refreshData;
        setInterval(fetchExecutions, 5000);
    </script>
</body>
</html>

# COSF Safety Configuration
# Define constraints for security workflow execution

# Restricted IP ranges (CIDR notation)
restricted_ips:
  - "127.0.0.1/32"
  - "10.0.0.0/8"
  - "192.168.0.0/16"
  - "172.16.0.0/12"

# Allowed time window for execution (local time)
allowed_times:
  start: "08:00"
  end: "20:00"

# Restricted adapters (e.g., destructive tools)
restricted_adapters:
  - "metasploit"
  - "destructive_exploit"

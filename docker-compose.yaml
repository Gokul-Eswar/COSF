services:
  db:
    image: postgres:16-alpine
    container_name: cosf-db
    environment:
      POSTGRES_USER: cosf
      POSTGRES_PASSWORD: cosf-password-123
      POSTGRES_DB: cosf
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cosf"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: cosf-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://cosf:cosf-password-123@db:5432/cosf
      - PORT=8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock # Required for tool adapters using Docker
    restart: unless-stopped

  # Future Worker Node (Scalable)
  # worker:
  #   build: .
  #   container_name: cosf-worker
  #   depends_on:
  #     - db
  #     - api
  #   environment:
  #     - DATABASE_URL=postgresql+asyncpg://cosf:cosf-password-123@db:5432/cosf
  #     - WORKER_MODE=true
  #   command: ["cosf", "worker"] # Command to be implemented
  #   volumes:
  #     - .:/app

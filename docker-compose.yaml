services:
  db:
    image: postgres:16-alpine
    container_name: cosf-db
    environment:
      POSTGRES_USER: cosf
      POSTGRES_PASSWORD: cosf-password-123
      POSTGRES_DB: cosf
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cosf"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cosf-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    container_name: cosf-api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://cosf:cosf-password-123@db:5432/cosf
      - REDIS_URL=redis://redis:6379
      - PORT=8000
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=cosf-neo4j-password-123
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  worker:
    build: .
    container_name: cosf-worker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://cosf:cosf-password-123@db:5432/cosf
      - REDIS_URL=redis://redis:6379
      - WORKER_MODE=true
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=cosf-neo4j-password-123
    command: ["cosf", "worker"]
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    container_name: cosf-neo4j
    ports:
      - "7474:7474" # HTTP UI
      - "7687:7687" # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/cosf-neo4j-password-123
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "cosf-neo4j-password-123", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
